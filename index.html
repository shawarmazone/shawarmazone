<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shawarma Zone</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0d0d0d;
  color: white;
}

.hero {
  height: 90vh;
  background: linear-gradient(rgba(0,0,0,.7), rgba(0,0,0,.9)),
  url('https://images.unsplash.com/photo-1529006557810-274b9b2fc783');

  align-items: center;
  justify-content: center;

}

  color: #ffcc00;
}

.btn {
  padding: 15px 25px;
  border-radius: 12px;
  text-decoration: none;
  display: inline-block;
  margin: 10px;
  font-weight: bold;
}

.whatsapp {
  background: #25D366;
  color: white;
}

.pay {
  background: #ffcc00;
  color: black;
}

.section {
  padding: 50px 20px;
  text-align: center;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
}

.card {
  background: #1a1a1a;
  border-radius: 15px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 180px;

.footer {

</head>

      <a class="btn whatsapp" href="https://wa.me/96598000820?text=ابي%20اسكندر">اطلب الآن</a>
