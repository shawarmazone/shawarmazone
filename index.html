<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shawarma Zone</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0d0d0d;
  color: white;
}

/* الهيدر */
.hero {
  height: 90vh;
  background: linear-gradient(rgba(0,0,0,.7), rgba(0,0,0,.9)),
  url('hero.png');
  background-size: cover;
  background-position: center;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.hero h1 {
  font-size: 55px;
  color: #ff2d2d;
}

.hero p {
  font-size: 20px;
}

/* الأزرار */
.btn {
  padding: 15px 25px;
  border-radius: 12px;
  text-decoration: none;
  display: inline-block;
  margin: 10px;
  font-weight: bold;
}

.whatsapp {
  background: #25D366;
  color: white;
}

.pay {
  background: #ff2d2d;
  color: white;
}

/* اللوجو */
.logo {
  position: absolute;
  top: 20px;
  right: 20px;
}

.logo img {
  width: 120px;
}

/* السكشن */
.section {
  padding: 50px 20px;
  text-align: center;
}

/* المنتجات */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
  gap: 20px;
}

.card {
  background: #1a1a1a;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 10px 20px rgba(0,0,0,.5);
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.card h3 {
  color: #ff2d2d;
}

.price {
  color: #ffd700;
  font-size: 18px;
}

/* الفوتر */
.footer {
  background: black;
  padding: 20px;
}
</style>
</head>

<body>

<!-- اللوجو -->
<div class="logo">
  <img src="logo.png">
</div>

<!-- الهيدر -->
<div class="hero">
  <div>
    <h1>شاورما زوون 🔥</h1>
    <p>الطعم التركي الأصيل في الكويت</p>

    <a class="btn whatsapp" href="https://wa.me/96598000820">
      اطلب عبر واتساب
    </a>

    <a class="btn pay" href="#">
      ادفع الآن
    </a>
  </div>
</div>

<!-- المنتجات -->
<div class="section">
  <h2>🔥 قائمة الطلبات</h2>

  <div class="grid">

    <div class="card">
      <img src="shawarma.jpeg">
      <h3>وجبة شاورما</h3>
      <p>شاورما + بطاط + مشروب</p>
      <div class="price">1.750 KD</div>
      <a class="btn whatsapp" href="https://wa.me/96598000820?text=ابي%20وجبة%20شاورما">
        اطلب الآن
      </a>
    </div>

    <div class="card">
      <img src="rice.jpeg">
      <h3>شاورما مع رز</h3>
      <p>رز + شاورما دجاج</p>
      <div class="price">2.000 KD</div>
      <a class="btn whatsapp" href="https://wa.me/96598000820?text=ابي%20شاورما%20رز">
        اطلب الآن
      </a>
    </div>

  </div>
</div>

<!-- المميزات -->
<div class="section">
  <h2>ليش تختارنا؟</h2>
  <p>🔥 طعم تركي أصلي | 🚀 توصيل سريع | 🥇 جودة عالية</p>
</div>

<!-- الفوتر -->
<div class="footer">
  Shawarma Zone © 2026
</div>

</body>
</html>
